# .claude/workflow.yaml
# ---------------------
# Cadence workflow definition. The /cadence:tick bootstrap reads this
# file on every fire. No restart needed for config changes — edit and the
# next fire picks up the new shape.
#
# Validation rules (enforced at the top of every fire — invalid configs
# never reach Linear):
#   - Every linear_state value (plus linear.pickup_state) must be unique
#     across the whole config.
#   - Exactly one `entry` state; it must exist and be of type: agent.
#   - Every `next`, `on_approve`, `on_rework` target must reference a
#     defined state.
#   - Every state.subagent must resolve to .claude/agents/cadence/{name}.md.
#   - No gate state may carry the legacy `approved_linear_state` or
#     `rework_linear_state` keys (removed in P4 — gates now signal
#     verdicts via the cadence_approve / cadence_rework labels).
#   - Any `max_in_flight` value must be a positive integer (>= 1) and
#     may only appear on `type: agent` or `type: gate` states (rejected
#     on terminals). Agent caps throttle parallel subagent runs at the
#     state itself; gate caps throttle the gate's *waiting queue* by
#     dropping pickups whose happy-path downstream feeds the gate.
#   - `merge_on_approve`, where set, must be a boolean on a gate whose
#     `on_approve` is a terminal state; `merge_method`, where set, must be
#     one of merge / squash / rebase on such a gate (Rule 9). The pre-MCP
#     `merge_args` key (raw `gh` flags) is rejected — PR ops now run via
#     GitHub MCP.

linear:
  # Required. Your Linear team key (e.g. "ENG", "PROD"). Used by the
  # bootstrap when querying for eligible issues.
  team: ENG

  # Optional. The Linear project to scope issues to. Omit (or comment
  # out) to let Cadence pick up any eligible issue in the team
  # regardless of project assignment. Set it to narrow pickup to one
  # project — useful when a team runs multiple projects and only some
  # are Cadence-managed.
  #
  # When set, use the project's NAME as it appears in Linear (e.g.
  # "cadence-testing") or its UUID. Do NOT use the URL suffix — Linear's
  # project URLs look like /project/cadence-testing-25c5db300551, but
  # the trailing hash is not accepted as a filter value by Linear's MCP;
  # only the name or UUID work. UUID is more stable across renames.
  # project_slug: replace-with-your-project-name

  # Required. The Linear state new issues land in. Issues here are eligible
  # for pickup; on first fire they move to the entry state's linear_state.
  pickup_state: "Todo"

label:
  # Soft lock label. Added at the start of every fire and removed at the
  # end. Stale ones are cleared by /cadence:sweep.
  cadence_active: "cadence-active"

  # Set when an issue exceeds max_attempts_per_issue or max_rework.
  # Excludes the issue from pickup until a human removes the label.
  cadence_needs_human: "cadence-needs-human"

  # Gate verdict labels. A human adds one of these to an issue sitting
  # in a gate's waiting column to signal their decision. The bootstrap
  # reads the label, acts on it, and removes it. Two labels cover every
  # gate in the workflow — the gate's waiting column identifies which
  # gate; the label only carries the verdict.
  #
  # Recommended: put both labels in a Linear label group (workspace
  # settings → Labels → New group) so Linear renders the verdict as a
  # single-select control. Without a group the two labels are
  # independent toggles a reviewer can set simultaneously; the
  # bootstrap treats that case as rework, but the group makes it
  # structurally unreachable from the UI.
  cadence_approve: "cadence-approve"
  cadence_rework: "cadence-rework"

limits:
  # Hard cap on consecutive attempts at any single workflow state for a
  # single issue. When exceeded, the bootstrap posts a needs-human comment
  # and adds the cadence_needs_human label.
  max_attempts_per_issue: 3

  # Optional. /cadence:sweep clears cadence_active labels that have
  # been set on issues with no updates within this window. Default 30.
  # stale_after_minutes: 30

# The first workflow state new issues enter. Must be type: agent.
entry: plan

# Workflow states. The default flow has six states:
#   plan → plan_review (gate) → implement → agent_review → human_review (gate) → done
# Each state has a `type` (agent / gate / terminal) and a `linear_state`
# (its Linear column). Agent states name a `subagent`; gate states route
# via `on_approve` / `on_rework` and are decided by a human via the
# cadence_approve / cadence_rework labels.
states:
  # ----------- planning -----------
  plan:
    type: agent
    subagent: cadence-planner        # → .claude/agents/cadence/cadence-planner.md
    linear_state: "Planning"         # Linear column for this state
    next: plan_review                # On success → this state
    # Optional: cap **parallel subagent runs at this state** by counting
    # the issues currently in this state's linear_state column on every
    # fire (no sidecar state); coordination is approximate, not a hard
    # lock. Omit for unlimited. Valid on type: agent and type: gate
    # states (rejected by the validator on terminals); see the comments
    # on plan_review and human_review for gate-cap semantics, which
    # differ — gate caps throttle the *waiting queue* and bind on
    # candidates upstream of the gate, whereas agent caps only bind on
    # parallel runs at this state. For controlling pile-up in
    # plan_review / human_review, use the gate cap; the agent cap here
    # only limits how many planners run in parallel.
    # max_in_flight: 3

  # ----------- plan review gate (human approves the plan before code) -----------
  plan_review:
    type: gate
    linear_state: "Plan Review"      # NEW Linear column — add it to your board
    on_approve: implement                   # next state when cadence_approve is seen
    on_rework: plan                         # next state when cadence_rework is seen
    max_rework: 2
    # Optional: cap the gate's **waiting queue**. When N issues are
    # sitting in this column, the bootstrap blocks new pickups whose
    # bounded reachability walk reaches this gate — for plan_review,
    # that's any Todo candidate (entering the workflow at `plan`,
    # walking to `plan_review`). Downstream gates (e.g. human_review)
    # do NOT block Todo pickups; each reviewer's bandwidth is throttled
    # by their own gate's cap. Verdict-bearing issues already in this
    # column are NOT blocked — acting on a verdict drains the queue,
    # so the gate's own cap is bypassed for verdict drainage. Useful
    # for capping the depth of work this gate's reviewer is asked to
    # triage. Omit for unlimited. Valid on type: agent and type: gate;
    # rejected by the validator on terminals.
    # max_in_flight: 5

  # ----------- implementation -----------
  implement:
    type: agent
    subagent: cadence-implementer    # → .claude/agents/cadence/cadence-implementer.md
    linear_state: "Implementing"
    next: agent_review
    # Optional cap on **parallel implementer runs** at this state (see
    # `plan` above for the full explanation). For backpressure into
    # `human_review`, cap that gate directly — under the bounded walk
    # an at-cap `human_review` blocks pickups whose walk reaches it
    # (e.g. plan-approved candidates targeting `implement`), without
    # blocking Todo pickups whose walk stops at the earlier
    # `plan_review` gate.
    # max_in_flight: 3

  # ----------- automated code review (adversarial, no implementer narrative) -----------
  agent_review:
    type: agent
    subagent: cadence-reviewer       # → .claude/agents/cadence/cadence-reviewer.md
    linear_state: "Reviewing"        # NEW Linear column — add it to your board
    # Strip the implementer's narrative from the Lifecycle Context so the
    # reviewer reads the diff cold (tick.md Step 8 adversarial-context
    # variant). Boolean; only valid on type: agent states.
    adversarial_context: true
    next: human_review
    # Optional cap on **parallel reviewer runs** at this state (see
    # `plan` above for the full explanation). Rarely needed in
    # practice — agent reviews are short and don't usually bottleneck
    # downstream.
    # max_in_flight: 3

  # ----------- human review gate -----------
  human_review:
    type: gate
    # The single Linear column this gate uses — the waiting queue. Must
    # exist as a column on your Linear board and be unique across the
    # whole workflow config. Gate signalling is label-based since P4.
    linear_state: "In Review"
    # A human signals their verdict by adding label.cadence_approve or
    # label.cadence_rework to the issue while it sits in "In Review".
    # The bootstrap reads the label on the next fire, removes it, and
    # routes the issue to the corresponding target state.
    on_approve: done                        # next state when cadence_approve is seen
    on_rework: implement                    # next state when cadence_rework is seen
    # Optional. Max rework rounds before the bootstrap escalates with
    # cadence_needs_human. Omit for unlimited rework.
    max_rework: 2
    # Optional cap on the gate's **waiting queue** (see plan_review
    # above for the full gate-cap explanation). The primary lever for
    # controlling this reviewer's load: when N issues are sitting in
    # "In Review", the bootstrap drops candidates whose bounded walk
    # reaches this gate — concretely, plan-approved candidates
    # (targeting `implement`) and the implementer/agent_review chain
    # downstream of them. Todo pickups are NOT affected (their walk
    # stops at plan_review). Verdict-bearing issues already in the
    # queue drain regardless of cap.
    # max_in_flight: 5
    #
    # Optional. After a human approves at this gate, merge the issue's PR
    # (via the GitHub connector's merge_pull_request) before advancing to
    # the on_approve terminal. The bootstrap reads PR state first: an
    # already-merged PR advances cleanly; an open PR is merged; a merge
    # failure (CI red, conflicts, branch protection) escalates with
    # cadence-needs-human and the card stays here. Only valid on a gate
    # whose on_approve is a terminal state.
    # merge_on_approve: true
    # merge_method: squash    # one of merge / squash / rebase; default squash

  # ----------- terminal -----------
  done:
    type: terminal
    linear_state: "Done"
